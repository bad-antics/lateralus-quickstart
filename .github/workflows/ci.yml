name: Lateralus CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lateralus
        run: pip install lateralus-lang

      - name: Lint
        run: lateralus lint src/

      - name: Test
        run: lateralus test

      - name: Build
        run: lateralus build src/main.ltl
